name: biocosmos-lite

services:
  backend:
    container_name: biocosmos-backend-lite
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:80"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    environment:
      # Container-internal paths (match the volume mounts below)
      - DUCK_DIR=/app/duck_db
      - LANCE_DIR=/app/lance_db
      - IMAGE_DIR=/app/images
      - IMAGE_META_DIR=/app/data
      - GBIF_DIR=/app/data
      - UMAP_DIR=/app/data
    env_file:
      # Optional — create ./backend/.env for LLM_API_URL / LLM_API_KEY secrets
      - path: ./backend/.env
        required: false
    volumes:
      - ./backend/duck_db:/app/duck_db
      - ./backend/lance_db_lite:/app/lance_db
      - ./backend/data:/app/data
      - ./backend/static:/app/static
      - ./public/images:/app/images

  frontend:
    container_name: biocosmos-frontend-lite
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3001:3000"
    environment:
      - API_HOST=http://backend:80
    depends_on:
      - backend
