# BioCosmos Image Embedding Configuration Example
# Copy this to config.yaml and adjust values for your use case

db:
  duck:
    file: "biocosmos.duckdb"
  lance:
    file: "biocosmos.lance"

images:
  table: "nymphalidae"
  # Limit number of images to ingest into the database, set to null for no limit
  # The backend checks for existing images first, so this limit only applies to new images
  limit: null

  # Maximum resolution in pixels for full-resolution images
  # Example values: 512, 800, 1024, 2048
  # Set to 0 to disable resizing
  max_resolution: 800

  # Maximum resolution in pixels for thumbnail images
  thumbnail_resolution: 128

  # File format for processed images on disk
  # Options: "jpeg", "png", "webp" (webp recommended for size)
  format: "webp"

  # Directory where processed images and thumbnails are saved
  # Full-res: {processed_dir}/{img_id}.{format}
  # Thumbnails: {processed_dir}/thumbnails/{img_id}_thumbnail.{format}
  processed_dir: "static/webp"

image_metadata:
  # Path to image metadata file (CSV or Parquet)
  file: "combined_meta_table_v2025_05_07.parquet"
  table: "image_meta"
  # Support csv or parquet
  format: "parquet"
  # Skip image metadata ingestion if set to true
  skip: false

umap_data:
  file: "umap-nymphalidae-embeddings-all.csv"
  table: "umap_embeddings"
  # Skip UMAP ingestion if set to true
  skip: false

gbif:
  file: "gbif-lepi-2024-occurrence.tsv"
  table: "gbif_meta"
  # Skip GBIF ingestion if set to true
  skip: false

leptrait:
  url: "https://raw.githubusercontent.com/hhandika/LepTraits/refs/heads/main/consensus/consensus.csv"
  table: "lep_traits_consensus"
  # Skip leptrait ingestion if set to true
  skip: true

embedder:
  # Skip embedding process if set to true
  skip: false

  # GPU acceleration options: "default", "cpu", "cuda", "mps"
  # "default" will detect the best available accelerator
  device: "default"

  # Select GPU for CUDA device, if multiple GPUs are available
  # 0 = first GPU, 1 = second GPU, etc.
  cuda_device: 0

  # Number of samples to process in each batch
  # Set according to your GPU memory:
  # - 4GB VRAM: 32-64
  # - 8GB VRAM: 64-128
  # - 16GB VRAM: 128-256
  # - 24GB+ VRAM: 256+
  batch_size: 150

  # Reset the inserted images and re-embed everything
  # Set to true to re-embed all images from scratch
  reset: true

openai:
  # OpenAI model to use for text summarization and other multi-modal tasks
  # Available models:
  # Llama (Meta): llama-3.1-70b-instruct, llama-3.1-8b-instruct
  # Mistral: mistral-7b-instruct, mistral-small, mistral-large
  # OpenAI GPT: gpt-4o-mini, gpt-4o, gpt-4-turbo
  # Google Gemini: gemini-2.0-flash, gemini-2.5-pro
  model: "gpt-4o-mini"
