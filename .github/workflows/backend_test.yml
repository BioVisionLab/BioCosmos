name: Backend-Tests

on:
    pull_request:
        paths:
            - "backend/**"
            - ".github/workflows/backend_test.yml"

permissions:
    contents: read

concurrency:
    group: backend-tests-${{ github.ref }}
    cancel-in-progress: true

jobs:
    gate-release:
        if: github.base_ref == 'release' && github.head_ref != 'main'
        runs-on: ubuntu-latest
        steps:
            - name: Block non-main PRs to release
              run: |
                  echo "::error::Only the main branch can be merged into release. Got: ${{ github.head_ref }}"
                  exit 1

    test:
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
                working-directory: backend

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Set up Python
              id: setup-python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Cache uv and venv
              uses: actions/cache@v5
              with:
                  path: |
                      ~/.cache/uv
                      backend/.venv
                  key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-uv-${{ hashFiles('backend/pyproject.toml', 'backend/uv.lock') }}

            - name: Install uv and dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install uv
                  uv sync --dev

            - name: Run pytest
              env:
                  PYTHONPATH: ${{ github.workspace }}/backend
              run: uv run pytest -q
