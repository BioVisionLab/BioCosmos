name: Build, Push and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        id: py
        with:
          python-version: "3.11"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            backend/.venv
          key: ${{ runner.os }}-py${{ steps.py.outputs.python-version }}-uv-${{ hashFiles('backend/pyproject.toml', 'backend/uv.lock') }}

      - name: Install and test
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          pip install uv
          uv sync --dev
          uv run pytest -q

  deploy:
    runs-on: self-hosted
    needs: test-backend
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set image names
        id: img
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "backend=ghcr.io/${OWNER}/biocosmos-backend" >> $GITHUB_OUTPUT
          echo "frontend=ghcr.io/${OWNER}/biocosmos-frontend" >> $GITHUB_OUTPUT

      - name: Build backend image
        run: |
          podman build -t ${{ steps.img.outputs.backend }}:latest \
                       -t ${{ steps.img.outputs.backend }}:${{ github.sha }} \
                       -f backend/Dockerfile backend/

      - name: Build frontend image
        run: |
          podman build -t ${{ steps.img.outputs.frontend }}:latest \
                       -t ${{ steps.img.outputs.frontend }}:${{ github.sha }} \
                       -f Dockerfile.frontend .

      - name: Push images
        run: |
          podman push ${{ steps.img.outputs.backend }}:latest
          podman push ${{ steps.img.outputs.backend }}:${{ github.sha }}
          podman push ${{ steps.img.outputs.frontend }}:latest
          podman push ${{ steps.img.outputs.frontend }}:${{ github.sha }}

      - name: Login to registry and restart services
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
          systemctl --user restart biocosmos-backend.service
          systemctl --user restart biocosmos-frontend.service
